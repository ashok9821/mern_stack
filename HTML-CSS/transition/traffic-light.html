<!DOCTYPE html>
<html>
<head>
<style>
body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
}

.traffic-light{
    width: 100px;
    background: black;
    padding: 15px;
    border-radius: 10px;
}

.light{
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #333;
    margin: 10px auto;
}

.red{
    animation: redLight 6s infinite;
}

.yellow{
    animation: yellowLight 6s infinite;
}

.green{
    animation: greenLight 6s infinite;
}

@keyframes redLight{
    0%, 33%{
        background: red;
        box-shadow: 0 0 20px red;
    }
    34%, 100%{
        background: rgb(189, 45, 45);
        box-shadow: none;
    }
}

@keyframes yellowLight{
    0%, 33%{
        background: rgb(125, 125, 53);
    }
    34%, 66%{
        background: yellow;
        box-shadow: 0 0 20px yellow;
    }
    67%, 100%{
        background: rgb(125, 125, 53);
        box-shadow: none;
    }
}

@keyframes greenLight{
    0%, 66%{
        background: rgb(23, 86, 23);
    }
    67%, 100%{
        background: green;
        box-shadow: 0 0 20px green;
    }
}
</style>
</head>
<body>

<div class="traffic-light">
    <div class="light red"></div>
    <div class="light yellow"></div>
    <div class="light green"></div>
</div>

</body>
</html>
