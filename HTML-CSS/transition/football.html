<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Move</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #ffffff;
        }

        .football {
            width: 110px;
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            animation: moveRotateFootball 4s linear infinite alternate;
        }

        .football img {
            width: 100%;
            display: block;
        }

        @keyframes moveRotateFootball {
            from {
                transform: translateY(-50%) translateX(0) rotate(0deg);
            }
            to {
                transform: translateY(-50%) translateX(calc(100vw - 110px)) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="football" aria-label="Football moving left to right">
        <img src="football.png" alt="Football">
    </div>
</body>
</html>
