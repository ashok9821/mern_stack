<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            transition-duration: 0.4s;
            transition-property:all;
            height: 100px;
            width: 200px;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            
        }
        button:hover{
            background-color: rgb(215, 14, 118);
            
            color: #fff;
            height: 100px;
            width: 100px;
        }
    </style>
</head>
<body>
    <div>
        <button>Click me</button>
    </div>
    
</body>
</html>
