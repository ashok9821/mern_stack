<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Profile Card</title>
    <style>
        :root {
            --bg-start: #7c2cbf;
            --bg-end: #8f52d9;
            --card-white: #ffffff;
            --text-dark: #2f2f3a;
            --text-soft: #90909c;
            --muted: #ececf2;
            --follow: #6f1cc5;
            --follow-dark: #55119b;
            --message: #b2b2b2;
            --shadow: 0 26px 50px rgba(13, 9, 28, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f2f2;
            color: var(--text-dark);
        }

        .frame {
            width: min(92vw, 380px);
            background: linear-gradient(145deg, var(--bg-end), var(--bg-start));
            border-radius: 2px;
            box-shadow: var(--shadow);
            display: grid;
            place-items: center;
            padding: 34px 20px;
            position: relative;
        }

        .card {
            width: min(100%, 280px);
            background: var(--card-white);
            border-radius: 12px;
            text-align: center;
            padding: 94px 24px 22px;
            box-shadow: 0 18px 32px rgba(40, 23, 74, 0.22);
            position: relative;
        }

        .photo-wrap {
            width: 182px;
            height: 182px;
            border-radius: 18px;
            position: absolute;
            left: 50%;
            top: -15px;
            transform: translateX(-50%);
            overflow: hidden;
            box-shadow: 0 14px 24px rgba(29, 19, 57, 0.35);
            background: #2a1b49;
        }

        .photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .status-ring {
    position: absolute;
    right: 20px;
    top: -29px;
    z-index: 99;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #8cff9f 8%, #2fce57 60%, #0f8f2f 100%);
    border: 4px solid #17a43a;
    box-shadow: 0 8px 18px rgba(13, 100, 34, 0.38);
    display: grid;
    place-items: center;

    /* Blink Animation */
    animation: blink 1s infinite;
}

.status-ring::after {
    content: "\2713";
    font-size: 22px;
    font-weight: 700;
    color: #f3fff7;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.28);
}

@keyframes blink {
    0%, 100% {
        opacity: 1;
        transform: scale(1);
    }
    50% {
        opacity: 0.3;
        transform: scale(0.9);
    }
}

        h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #19191f;
            letter-spacing: 0.2px;
        }

        .name {
            font-size: 26px;
            font-weight: 600;
            margin-top: 90px;
        }

        .role {
            color: var(--text-soft);
            font-size: 16px;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 22px;
        }

        .stat {
            min-width: 60px;
        }

        .stat strong {
            display: block;
            font-size: 26px;
            line-height: 1;
            margin-bottom: 3px;
        }

        .stat span {
            display: block;
            color: var(--text-soft);
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            border: none;
            border-radius: 6px;
            width: 112px;
            height: 43px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .follow {
            background: linear-gradient(160deg, #8025df, var(--follow));
            color: #fff;
            box-shadow: 0 8px 14px rgba(87, 20, 158, 0.35);
        }

        .message {
            background: #b8b8b8;
            color: #fff;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .follow:hover {
            box-shadow: 0 10px 18px rgba(78, 12, 142, 0.42);
            background: linear-gradient(160deg, #8d36e8, var(--follow-dark));
        }

        .message:hover {
            opacity: 0.92;
        }

        @media (max-width: 420px) {
            .frame {
                padding: 28px 14px;
            }

            .card {
                padding-left: 16px;
                padding-right: 16px;
            }

            .photo-wrap {
                width: 162px;
                height: 162px;
            }

            .name {
                font-size: 26px;
            }

            .stat strong {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="frame">
        <section class="card" aria-label="Profile card">
            <div class="status-ring" aria-hidden="true"></div>
            <div class="photo-wrap">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=600&q=80" alt="Sophia Carter">
                
            </div>

            <h2 class="name">Sophia Carter</h2>
            <p class="role">Web Developer</p>

            <div class="stats">
                <div class="stat">
                    <strong>100</strong>
                    <span>Posts</span>
                </div>
                <div class="stat">
                    <strong>940k</strong>
                    <span>Followers</span>
                </div>
                <div class="stat">
                    <strong>185</strong>
                    <span>Following</span>
                </div>
            </div>

            <div class="actions">
                <button class="follow" type="button">Follow</button>
                <button class="message" type="button">Message</button>
            </div>
        </section>

    </main>
</body>
</html>
