<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="top-header">
        <div class="container">
            <div class="row  pt-4">
                <div class="col-6">
                    <div class="row">
                        <div class="col-4 bg text-center py-3">
                            <img src="image/flipkart-logo.png" class="img-fluid logo-size w-50">
                        </div>
                         <div class="col-4 text-center py-3 travel-logo  ms-4">
                            <a href="#">
                            <img src="image/travel-logo.png" class="img-fluid logo-size w-25">
                            </a>
                        </div>
                    </div>

                </div>
                <div class="col-6 justify-content-end d-flex m-auto">
                    <p class="mb-0"><i class="bi bi-geo-alt-fill"></i> Vadodara</p>
                </div>

            </div>
        </div>
    </div>
<div class="search-header">
        <div class="container">
            <div class="row align-items-center py-3">
                <div class="col-md-8">
                    <div class="search-container">
                        <input type="text" class="form-control search-input" placeholder="Search for Products, Brands and More">
                    </div>
                </div>
                <div class="col-md-4 d-flex justify-content-end gap-4 align-items-center">
                    <div class="header-option">
                        <i class="bi bi-person-circle"></i>
                        <span>Login</span>
                    </div>
                    <div class="header-option">
                        <span>More</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <div class="header-option">
                        <i class="bi bi-cart3"></i>
                        <span>Cart</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
