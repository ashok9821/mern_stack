<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <!-- Profile Card -->
                <div class="profile-card bg-white rounded-4 shadow-lg p-4">
                    
                    <!-- Header with Back & Menu Icons -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <button class="btn btn-light border-0">
                            <i class="bi bi-chevron-left fs-5"></i>
                        </button>
                        <button class="btn btn-light border-0">
                            <i class="bi bi-three-dots-vertical fs-5"></i>
                        </button>
                    </div>

                    <!-- Profile Image Section -->
                    <div class="text-center mb-4 position-relative d-inline w-100">
                        <div class="profile-image-wrapper d-flex justify-content-center">
                            <img src="profile.jpeg" alt="CodingNepal" class="rounded-circle" style="width: 150px; height: 150px; object-fit: cover;">
                           
                        </div>
                    </div>

                    <!-- Name & Title -->
                    <div class="text-center mb-3 ">
                        <h3 class="fw-bold mb-1">Coding Nepal</h3>
                        <p class="text-muted mb-0">Designer & Developer</p>
                    </div>

                    <!-- Social Media Icons -->
                    <div class="social-icons d-flex justify-content-center gap-3 mb-4">
                        <a href="#" class="social-link text-primary">
                            <i class="bi bi-facebook"></i>
                        </a>
                        <a href="#" class="social-link text-info">
                            <i class="bi bi-twitter"></i>
                        </a>
                        <a href="#" class="social-link" style="color: #E4405F;">
                            <i class="bi bi-instagram"></i>
                        </a>
                        <a href="#" class="social-link text-danger">
                            <i class="bi bi-youtube"></i>
                        </a>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-inline gap-3 mb-4 justify-content-center d-flex">
                        <button class="btn btn-outline-secondary rounded-3 py-2">Message</button>
                        <button class="btn btn-secondary rounded-3 py-2">Subscribe</button>
                    </div>

                    <!-- Stats Section -->
                    <div class="stats-section d-flex justify-content-around text-center border-top pt-3">
                        <div>
                            <p class="text-muted mb-0 small">Likes</p>
                            <h6 class="fw-bold mb-0">20.4k</h6>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">Comments</p>
                            <h6 class="fw-bold mb-0">14.3k</h6>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">Shares</p>
                            <h6 class="fw-bold mb-0">12.8k</h6>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
